# Shared defaults applied to ALL services via Spring Cloud Config
# Service-specific overrides live in {application}/application.yml

server:
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024
  http2:
    enabled: true

spring:
  # Spring Cloud Bus over Kafka is disabled across all services until MSK
  # SASL/IAM auth is wired up at the infra layer. With it enabled, services
  # carrying spring-cloud-starter-bus-kafka default the broker to
  # localhost:9092 and the AdminClient spams reconnect attempts indefinitely,
  # delaying startup past the liveness probe deadline. See VEL-* (MSK auth).
  cloud:
    bus:
      enabled: false
  data:
    mongodb:
      uri: ${MONGODB_URI}
      database: ${MONGODB_DATABASE:velaris}

management:
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  health:
    mongo:
      enabled: false

logging:
  level:
    root: INFO
    com.velaris: INFO
